<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Aviator - SkyRiseBet</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0e14;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      color: #fff;
      margin: 0;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: #141a24;
      border-radius: 24px;
      padding: 16px 14px 20px;
      border: 1px solid #2a2f3a;
      position: relative;
      overflow: hidden;
    }

    /* ===== LOADER SCREEN ===== */
    #loaderScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b0e14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      border-radius: 24px;
      transition: opacity 0.6s ease;
    }
    #loaderScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #2a2f3a;
      border-top: 4px solid #fbbf24;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader-text {
      color: #8a9bb0;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    .loader-text span { color: #fbbf24; font-weight: 600; }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fbbf24;
    }
    .header .balance {
      background: #1e2632;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 13px;
      color: #8a9bb0;
    }
    .header .balance span { color: #fbbf24; font-weight: 600; }

    /* ===== LIVE STATS ===== */
    .live-stats {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 10px;
      padding: 0 4px;
    }
    .live-stats .online { color: #22c55e; }
    .live-stats .online::before { content: "● "; font-size: 10px; }

    /* ===== GAME AREA ===== */
    .game-area {
      background: #0b0e14;
      border-radius: 16px;
      padding: 30px 10px 20px;
      text-align: center;
      border: 1px solid #2a2f3a;
      position: relative;
      margin-bottom: 12px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .game-area .multiplier {
      font-size: 56px;
      font-weight: 800;
      color: #fbbf24;
      letter-spacing: -2px;
      transition: color 0.15s;
    }
    .game-area .status {
      font-size: 13px;
      color: #8a9bb0;
      margin-top: 4px;
    }
    .game-area .status .live { color: #22c55e; font-weight: 600; }
    .game-area .status .crashed { color: #ef4444; font-weight: 600; }

    /* ===== BET CONTROLS ===== */
    .bet-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    .bet-controls input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #2a2f3a;
      background: #0b0e14;
      color: #fff;
      font-size: 14px;
      outline: none;
      min-width: 0;
    }
    .bet-controls input:focus { border-color: #fbbf24; }
    .bet-controls input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .bet-controls button {
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      background: #fbbf24;
      color: #0b0e14;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
      white-space: nowrap;
    }
    .bet-controls button:active { transform: scale(0.96); }
    .bet-controls button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== CASH-OUT TARGET ===== */
    .target-section {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .target-section label {
      font-size: 12px;
      color: #8a9bb0;
      white-space: nowrap;
    }
    .target-section input {
      flex: 1;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #2a2f3a;
      background: #0b0e14;
      color: #fff;
      font-size: 14px;
      outline: none;
      width: 100%;
    }
    .target-section input:focus { border-color: #fbbf24; }

    /* ===== BUTTONS ===== */
    .btn-deposit, .btn-withdraw {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
      margin-bottom: 8px;
    }
    .btn-deposit { background: #1a73e8; color: #fff; }
    .btn-withdraw { background: #22c55e; color: #fff; }
    .btn-deposit:active, .btn-withdraw:active { transform: scale(0.96); }

    /* ===== HISTORY ===== */
    .history {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #1a202a;
    }
    .history .h-item {
      background: #1a202a;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      color: #8a9bb0;
    }
    .history .h-item.crashed { color: #ef4444; }
    .history .h-item.win { color: #22c55e; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2632;
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      border: 1px solid #2a2f3a;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 480px) {
      .container { padding: 12px 10px 16px; }
      .game-area .multiplier { font-size: 42px; }
      .bet-controls input { font-size: 13px; padding: 8px 10px; }
      .bet-controls button { font-size: 13px; padding: 8px 12px; }
    }
  </style>
</head>
<body>

<div class="container" id="app">

  <!-- ===== LOADER SCREEN ===== -->
  <div id="loaderScreen">
    <div class="loader-spinner"></div>
    <div class="loader-text">Loading <span>SkyRiseBet</span>...</div>
  </div>

  <!-- ===== HEADER ===== -->
  <div class="header">
    <h1>✈️ SkyRiseBet</h1>
    <div class="balance">💰 <span id="balanceDisplay">100.00</span></div>
  </div>

  <!-- ===== LIVE STATS ===== -->
  <div class="live-stats">
    <span class="online" id="onlineCount">4,872 online</span>
    <span>Total Payout: <span id="totalPayout">₦12.4M</span></span>
  </div>

  <!-- ===== GAME AREA ===== -->
  <div class="game-area" id="gameArea">
    <div class="multiplier" id="multiplierDisplay">1.00x</div>
    <div class="status"><span class="live" id="gameStatus">● Waiting for next round...</span></div>
  </div>

  <!-- ===== TARGET CASH-OUT ===== -->
  <div class="target-section">
    <label>🎯 Cash-out at:</label>
    <input type="number" id="targetMultiplier" placeholder="e.g. 2.50" step="0.01" min="1.01" value="2.50" />
  </div>

  <!-- ===== BET CONTROLS ===== -->
  <div class="bet-controls">
    <input type="number" id="betAmount" placeholder="Amount" value="10" step="5" min="1" />
    <button id="betBtn">Place Bet</button>
  </div>

  <!-- ===== DEPOSIT / WITHDRAW ===== -->
  <button class="btn-deposit" id="depositBtn">💰 Deposit</button>
  <button class="btn-withdraw" id="withdrawBtn">💸 Withdraw</button>

  <!-- ===== HISTORY ===== -->
  <div class="history" id="history"></div>

</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
  // ============================================================
  // SKYRISEBET — AVIATOR CLONE WITH 5‑POINT RIG LOGIC
  // ============================================================

  // ---- STATE ----
  let balance = parseFloat(localStorage.getItem('skyBalance')) || 100;
  let isPlaying = false;
  let currentMultiplier = 1.00;
  let gameInterval = null;
  let history = JSON.parse(localStorage.getItem('skyHistory')) || [];

  // ---- DOM REFS ----
  const balanceDisplay = document.getElementById('balanceDisplay');
  const multiplierDisplay = document.getElementById('multiplierDisplay');
  const gameStatus = document.getElementById('gameStatus');
  const betAmount = document.getElementById('betAmount');
  const betBtn = document.getElementById('betBtn');
  const targetMultiplier = document.getElementById('targetMultiplier');
  const historyEl = document.getElementById('history');
  const toast = document.getElementById('toast');
  const loader = document.getElementById('loaderScreen');

  // ---- INIT ----
  balanceDisplay.textContent = balance.toFixed(2);
  renderHistory();

  // ---- HIDE LOADER AFTER 2s ----
  setTimeout(() => loader.classList.add('hidden'), 2000);

  // ---- TOAST ----
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
  }

  // ---- UPDATE BALANCE ----
  function updateBalance(amount) {
    balance = parseFloat(amount.toFixed(2));
    balanceDisplay.textContent = balance.toFixed(2);
    localStorage.setItem('skyBalance', balance);
  }

  // ---- RENDER HISTORY ----
  function renderHistory() {
    historyEl.innerHTML = history.slice(-12).map(h =>
      `<span class="h-item ${h.crashed ? 'crashed' : 'win'}">${h.value.toFixed(2)}x</span>`
    ).join('');
  }

  // ---- FAKE ONLINE COUNT ----
  setInterval(() => {
    const el = document.getElementById('onlineCount');
    const current = parseInt(el.textContent.replace(/,/g, ''));
    const change = Math.floor(Math.random() * 20) - 5;
    el.textContent = (current + change).toLocaleString();
  }, 8000);

  // ---- GAME ENGINE (RIGGED) ----
  function startRound() {
    if (isPlaying) return;

    const bet = parseFloat(betAmount.value) || 0;
    if (bet <= 0 || bet > balance) {
      showToast('❌ Invalid bet or insufficient balance.');
      return;
    }

    const target = parseFloat(targetMultiplier.value) || 2.50;
    if (target < 1.01) {
      showToast('❌ Target must be at least 1.01x.');
      return;
    }

    // Deduct bet
    updateBalance(balance - bet);
    isPlaying = true;
    betBtn.disabled = true;
    betBtn.textContent = 'CASH OUT';

    currentMultiplier = 1.00;
    multiplierDisplay.textContent = '1.00x';
    multiplierDisplay.style.color = '#fbbf24';
    gameStatus.innerHTML = '<span class="live">● Round in progress...</span>';

    // RIG: System crashes at target - 0.05 (5 points below)
    const crashPoint = Math.max(1.01, target - 0.05);

    let step = 0;
    const steps = 30 + Math.floor(Math.random() * 20); // Randomize speed slightly

    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(() => {
      step++;
      const progress = step / steps;
      const multiplier = 1 + progress * (crashPoint - 1);
      currentMultiplier = parseFloat(multiplier.toFixed(2));

      multiplierDisplay.textContent = currentMultiplier.toFixed(2) + 'x';

      // If player manually cashes out before crash
      // Handled by betBtn click
    }, 100);
  }

  // ---- CASH OUT (Player or System) ----
  function cashOut(systemCrashed = false) {
    if (!isPlaying) return;

    clearInterval(gameInterval);
    isPlaying = false;
    betBtn.disabled = false;
    betBtn.textContent = 'Place Bet';

    const target = parseFloat(targetMultiplier.value) || 2.50;
    const crashPoint = Math.max(1.01, target - 0.05);

    if (systemCrashed || currentMultiplier >= crashPoint) {
      // Player loses
      multiplierDisplay.style.color = '#ef4444';
      gameStatus.innerHTML = `<span class="crashed">💥 Crashed at ${crashPoint.toFixed(2)}x</span>`;
      history.push({ value: crashPoint, crashed: true });
      showToast(`💥 Crashed at ${crashPoint.toFixed(2)}x — you lost!`);
    } else {
      // Player cashed out successfully
      const win = parseFloat(betAmount.value) * currentMultiplier;
      updateBalance(balance + win);
      multiplierDisplay.style.color = '#22c55e';
      gameStatus.innerHTML = `<span class="live">✅ Cashed out at ${currentMultiplier.toFixed(2)}x</span>`;
      history.push({ value: currentMultiplier, crashed: false });
      showToast(`✅ Won ${win.toFixed(2)} at ${currentMultiplier.toFixed(2)}x`);
    }

    renderHistory();
    localStorage.setItem('skyHistory', JSON.stringify(history));

    // Start next round after delay
    setTimeout(() => {
      if (!isPlaying) {
        multiplierDisplay.style.color = '#fbbf24';
        gameStatus.innerHTML = '<span class="live">● Waiting for next round...</span>';
      }
    }, 3000);
  }

  // ---- BET BUTTON ----
  betBtn.addEventListener('click', function() {
    if (isPlaying) {
      // Player manually cashing out
      cashOut(false);
    } else {
      startRound();
    }
  });

  // ---- DEPOSIT / WITHDRAW (Placeholders) ----
  document.getElementById('depositBtn').addEventListener('click', () => {
    showToast('💰 Deposit feature coming soon.');
  });
  document.getElementById('withdrawBtn').addEventListener('click', () => {
    showToast('💸 Withdraw feature coming soon.');
  });

  // ---- KEYBOARD SHORTCUT ----
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') betBtn.click();
  });

  // ---- AUTO-CRASH (System triggers if target reached) ----
  // This is monitored inside the interval — we override the crash logic
  // The existing startRound interval will continue increasing until crash point.
  // We need to check if currentMultiplier >= crashPoint inside the interval.

  // We'll override the interval logic by storing a reference and checking.
  // Let's rewrite startRound with a cleaner approach.

  // ---- OVERRIDE startRound with full rig ----
  const originalStart = startRound;
  startRound = function() {
    if (isPlaying) return;

    const bet = parseFloat(betAmount.value) || 0;
    if (bet <= 0 || bet > balance) {
      showToast('❌ Invalid bet or insufficient balance.');
      return;
    }

    const target = parseFloat(targetMultiplier.value) || 2.50;
    if (target < 1.01) {
      showToast('❌ Target must be at least 1.01x.');
      return;
    }

    updateBalance(balance - bet);
    isPlaying = true;
    betBtn.disabled = true;
    betBtn.textContent = 'CASH OUT';

    currentMultiplier = 1.00;
    multiplierDisplay.textContent = '1.00x';
    multiplierDisplay.style.color = '#fbbf24';
    gameStatus.innerHTML = '<span class="live">● Round in progress...</span>';

    const crashPoint = Math.max(1.01, target - 0.05);
    let step = 0;
    const steps = 30 + Math.floor(Math.random() * 20);

    if (gameInterval) clearInterval(gameInterval);
    gameInterval = setInterval(() => {
      step++;
      const progress = step / steps;
      const multiplier = 1 + progress * (crashPoint - 1);
      currentMultiplier = parseFloat(multiplier.toFixed(2));
      multiplierDisplay.textContent = currentMultiplier.toFixed(2) + 'x';

      // System crash check
      if (currentMultiplier >= crashPoint) {
        cashOut(true);
      }
    }, 100);
  };

  // ---- Re-bind ----
  // The betBtn click now uses the new startRound
  // We already have the listener above, which calls startRound()

  console.log('✈️ SkyRiseBet loaded — Rigged Aviator active.');
</script>
</body>
</html>
